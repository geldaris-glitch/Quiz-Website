	<script>
function submitQuiz() {
    console.log("Quiz submitted!");

    const answers = {
        q1: "Oxygen",
        q2: "Heart",
        q3: "Water",
        q4: "Mercury",
        q5: "Gravity",
        q6: "Sunlight"
    };

    let score = 0;

    for (let question in answers) {

        const selected = document.querySelector(
            `input[name="${question}"]:checked`
        );

        if (selected && selected.value === answers[question]) {
            score++;
        }
    }

    if (score >= 5) {
        document.getElementById("result").textContent =
            alert(`You scored ${score}/6. Good job!`);
    } else {
        document.getElementById("result").textContent =
            alert(`You scored ${score}/6. Better luck next time!`);
    }

}

</script>
